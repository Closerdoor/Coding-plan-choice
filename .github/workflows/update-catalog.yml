name: Update Catalog (3x Weekly)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 2 * * 1"
    - cron: "0 2 * * 3"
    - cron: "0 2 * * 5"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-catalog
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      CATALOG_SKIP_VENDOR_IDS: xfyun-xingchen-coding-plan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate catalog artifacts
        run: python -m catalog.update

      - name: Run selftests (no network)
        run: python -m unittest catalog.UTtest.selftest

      - name: Create pull request if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh catalog data"
          title: "chore: refresh catalog data"
          body: |
            自动定时更新：
            - CATALOG_GENERATED.md
            - catalog/output/CATALOG_DATA.json

            本次自动任务默认跳过需要登录态的讯飞星辰 Coding Plan。
          branch: "automation/update-catalog"
          delete-branch: true
          add-paths: |
            CATALOG_GENERATED.md
            catalog/output/CATALOG_DATA.json
