name: Update Catalog (3x Weekly)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 2 * * 1"
    - cron: "0 2 * * 3"
    - cron: "0 2 * * 5"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-catalog
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      CATALOG_UPDATE_MODE: auto
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate catalog artifacts
        run: python -m catalog.update

      - name: Run selftests (no network)
        run: python -m unittest catalog.UTtest.selftest

      - name: Upload catalog diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: catalog-auto-diagnostics
          path: |
            catalog/output/CATALOG_PREFLIGHT.json
            catalog/output/CATALOG_RUN.log
            catalog/output/CATALOG_DATA.json
            CATALOG_GENERATED.md

      - name: Create pull request if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh catalog data"
          title: "chore: refresh catalog data"
          body: |
            自动定时更新：
            - CATALOG_GENERATED.md
            - catalog/output/CATALOG_DATA.json

            本次自动任务仅更新代码中 `AUTO_UPDATE_VENDOR_IDS` 列表内的厂商。
          branch: "automation/update-catalog"
          delete-branch: true
          add-paths: |
            CATALOG_GENERATED.md
            catalog/output/CATALOG_DATA.json
