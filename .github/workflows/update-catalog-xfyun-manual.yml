name: Update Catalog XFYun (Manual)

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-catalog-xfyun-manual
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      CATALOG_UPDATE_MODE: manual
      XFYUN_SSO_SESSION_ID: ${{ secrets.XFYUN_SSO_SESSION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate XFYUN_SSO_SESSION_ID secret
        run: |
          if [ -z "$XFYUN_SSO_SESSION_ID" ]; then
            echo "Missing required secret: XFYUN_SSO_SESSION_ID" >&2
            exit 1
          fi

      - name: Generate manual catalog artifacts
        run: python -m catalog.update

      - name: Run selftests (no network)
        run: python -m unittest catalog.UTtest.selftest

      - name: Upload catalog diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: catalog-xfyun-manual-diagnostics
          path: |
            catalog/output/CATALOG_PREFLIGHT.json
            catalog/output/CATALOG_RUN.log
            catalog/output/CATALOG_DATA.json
            README.md

      - name: Create pull request if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh xfyun catalog data"
          title: "chore: refresh xfyun catalog data"
          body: |
            手动更新：
            - README.md
            - catalog/output/CATALOG_DATA.json

            本次手动任务仅更新代码中 `MANUAL_UPDATE_VENDOR_IDS` 列表内的厂商。
          base: "main"
          branch: "automation/update-catalog-xfyun-manual-${{ github.run_id }}"
          delete-branch: true
          add-paths: |
            README.md
            catalog/output/CATALOG_DATA.json
            catalog/output/CATALOG_PREFLIGHT.json
            catalog/output/CATALOG_RUN.log
