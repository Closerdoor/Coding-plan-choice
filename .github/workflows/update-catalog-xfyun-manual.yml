name: Update Catalog XFYun (Manual)

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-catalog-xfyun-manual
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      CATALOG_UPDATE_MODE: manual
      XFYUN_SSO_SESSION_ID: ${{ secrets.XFYUN_SSO_SESSION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate XFYUN_SSO_SESSION_ID secret
        run: |
          if [ -z "$XFYUN_SSO_SESSION_ID" ]; then
            echo "Missing required secret: XFYUN_SSO_SESSION_ID" >&2
            exit 1
          fi

      - name: Generate manual catalog artifacts
        run: python -m catalog.update

      - name: Run selftests (no network)
        run: python -m unittest catalog.UTtest.selftest

      - name: Upload catalog diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: catalog-xfyun-manual-diagnostics
          path: |
            catalog/output/CATALOG_PREFLIGHT.json
            catalog/output/CATALOG_RUN.log
            catalog/output/CATALOG_DATA.json
            README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md catalog/output/CATALOG_DATA.json catalog/output/CATALOG_PREFLIGHT.json catalog/output/CATALOG_RUN.log
          if git diff --cached --quiet; then
            echo "No manual catalog changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh xfyun catalog data"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep 5
          done
          exit 1
