name: Update Model Rankings (Weekly)

on:
  workflow_dispatch: {}
  schedule:
    # Weekly on Monday 03:00 UTC
    - cron: "0 3 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-model-rankings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate ranking artifacts
        run: python -m rankings.update

      - name: Run selftests (no network)
        run: python -m rankings.selftest

      - name: Create pull request if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh model rankings"
          title: "chore: refresh model rankings"
          body: |
            自动定时更新：
            - artifacts/rankings/MODEL_RANKING.md
            - artifacts/rankings/MODEL_SCORES.json
            - artifacts/rankings/MODEL_TOP3.md
          branch: "automation/update-model-rankings"
          delete-branch: true
          add-paths: |
            artifacts/rankings/MODEL_RANKING.md
            artifacts/rankings/MODEL_SCORES.json
            artifacts/rankings/MODEL_TOP3.md
