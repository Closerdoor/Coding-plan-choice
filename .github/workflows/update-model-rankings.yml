name: Update Model Rankings (Weekly)

on:
  workflow_dispatch: {}
  schedule:
    # Weekly on Monday 03:00 UTC
    - cron: "0 3 * * 1"

permissions:
  contents: write

concurrency:
  group: update-model-rankings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate ranking artifacts
        run: python -m rankings.update

      - name: Run selftests (no network)
        run: python -m unittest rankings.UTtest.test_rankings

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rankings/output/MODEL_RANKING.md rankings/output/MODEL_SCORES.json rankings/output/MODEL_TOP3.md
          if git diff --cached --quiet; then
            echo "No ranking changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh model rankings"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep 5
          done
          exit 1
